name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Create release metadata
        id: metadata
        shell: pwsh
        run: |
          $projectName = python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['name'])"
          $kst = [System.TimeZoneInfo]::FindSystemTimeZoneById("Korea Standard Time")
          $kstNow = [System.TimeZoneInfo]::ConvertTime([System.DateTimeOffset]::UtcNow, $kst)
          $baseTag = "v{0}" -f $kstNow.ToString("yyyy.MM.dd-HHmmss")
          $candidate = $baseTag
          $counter = 1

          while ($true) {
            $existingTag = git ls-remote --tags origin "refs/tags/$candidate"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to check existing remote tags."
            }
            if (-not $existingTag) {
              break
            }
            $candidate = "$baseTag-$counter"
            $counter += 1
          }

          $assetName = "${projectName}_${candidate}_windows.zip"
          "project_name=$projectName" >> $env:GITHUB_OUTPUT
          "tag=$candidate" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT

      - name: Run validation
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\validate.ps1

      - name: Build Windows release package
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\build_windows_gui_exe.ps1

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $assetDir = Join-Path $PWD "release_assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $sourceZip = Get-ChildItem -Path ".\dist" -Filter "*.zip" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $sourceZip) {
            throw "No release zip was generated in dist."
          }

          $assetName = "${{ steps.metadata.outputs.asset_name }}"
          $assetPath = Join-Path $assetDir $assetName
          Copy-Item -LiteralPath $sourceZip.FullName -Destination $assetPath -Force

          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $assetPath).Hash.ToLowerInvariant()
          $checksumPath = "$assetPath.sha256"
          "$hash  $assetName" | Set-Content -LiteralPath $checksumPath -Encoding ASCII

          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT
          "checksum_path=$checksumPath" >> $env:GITHUB_OUTPUT
          "checksum=$hash" >> $env:GITHUB_OUTPUT
          "checksum_name=$assetName.sha256" >> $env:GITHUB_OUTPUT

      - name: Create Korean release notes
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ steps.metadata.outputs.tag }}"
          $projectName = "${{ steps.metadata.outputs.project_name }}"
          $assetName = "${{ steps.metadata.outputs.asset_name }}"
          $checksum = "${{ steps.assets.outputs.checksum }}"
          $sha = "${{ github.sha }}"
          $branch = "${{ github.ref_name }}"
          $before = "${{ github.event.before }}"

          if ($before -and $before -notmatch "^0+$") {
            $range = "$before..$sha"
            $commitHashes = git log --format="%H" $range
            $changedFiles = git diff --name-only $range
          } else {
            $range = ""
            $commitHashes = git log --format="%H" -n 20 $sha
            $changedFiles = git show --pretty="" --name-only $sha
          }

          $changeSummary = New-Object System.Collections.Generic.List[string]
          foreach ($commitHash in $commitHashes) {
            if (-not $commitHash) {
              continue
            }
            $shortHash = git rev-parse --short $commitHash
            $subject = git log -1 --pretty=format:"%s" $commitHash
            $body = git log -1 --pretty=format:"%b" $commitHash
            $changeSummary.Add("- $subject ($shortHash)")
            foreach ($line in ($body -split "`r?`n")) {
              $trimmed = $line.Trim()
              if ($trimmed) {
                $changeSummary.Add("  - $trimmed")
              }
            }
          }
          if ($changeSummary.Count -eq 0) {
            $changeSummary.Add("- 변경 요약을 자동으로 찾지 못했습니다. 아래 원본 커밋 목록을 확인하세요.")
          }
          $changeSummaryText = $changeSummary -join [Environment]::NewLine

          $areas = New-Object System.Collections.Generic.List[string]
          function Add-ReleaseArea([string] $text) {
            if (-not $script:areas.Contains($text)) {
              $script:areas.Add($text)
            }
          }
          foreach ($file in $changedFiles) {
            if ($file -like ".github/workflows/*") {
              Add-ReleaseArea "- 배포 자동화: GitHub Actions 검증, 빌드, Release 생성 흐름이 변경되었습니다."
            } elseif ($file -eq "src/wlc_role_acl_collector/gui_app.py") {
              Add-ReleaseArea "- GUI: 화면 구성, 진행 상태, 사용자 알림 또는 수집 동작이 변경되었습니다."
            } elseif ($file -eq "src/wlc_role_acl_collector/report.py") {
              Add-ReleaseArea "- 보고서: HTML/Excel 보고서 생성 로직이 변경되었습니다."
            } elseif ($file -eq "src/wlc_role_acl_collector/role_networks.py") {
              Add-ReleaseArea "- Role 대역표: Excel 입력 파일 처리 로직이 변경되었습니다."
            } elseif ($file -like "tests/*") {
              Add-ReleaseArea "- 검증: 테스트 코드가 추가 또는 수정되었습니다."
            } elseif ($file -like "docs/*") {
              Add-ReleaseArea "- 문서: 사용자 문서 또는 기획 자료가 변경되었습니다."
            } elseif ($file -like "config/*") {
              Add-ReleaseArea "- 설정/샘플: 배포에 포함되는 설정 또는 샘플 파일이 변경되었습니다."
            } elseif ($file -like "*.ps1" -or $file -like "tools/*") {
              Add-ReleaseArea "- 빌드/도구: Windows 빌드 또는 검증 스크립트가 변경되었습니다."
            }
          }
          if ($areas.Count -eq 0) {
            Add-ReleaseArea "- 기타: 소스, 설정, 문서 중 하나 이상이 변경되었습니다."
          }
          $areaText = $areas -join [Environment]::NewLine

          $changedFileLines = @($changedFiles | Where-Object { $_ } | ForEach-Object { "- $_" })
          if (-not $changedFileLines) {
            $changedFileLines = @("- 변경 파일을 자동으로 찾지 못했습니다.")
          }
          $changedFileText = $changedFileLines -join [Environment]::NewLine

          if ($before -and $before -notmatch "^0+$") {
            $commitLines = git log --pretty=format:"- %h %s" "$before..$sha"
          } else {
            $commitLines = git log --pretty=format:"- %h %s" -n 20 $sha
          }
          if (-not $commitLines) {
            $commitLines = git log --pretty=format:"- %h %s" -n 1 $sha
          }
          $commitText = $commitLines -join [Environment]::NewLine

          $notesPath = Join-Path $PWD "release_notes.md"
          $notes = @"
          # $projectName $tag

          이 릴리즈는 main 브랜치에 반영된 변경 사항을 기준으로 GitHub Actions에서 자동 생성한 Windows 실행 패키지입니다.

          ## 변경내용
          $changeSummaryText

          ### 변경 영역
          $areaText

          ## 검증
          - 기준 커밋 SHA: $sha
          - 브랜치명: $branch
          - 실행한 검증 명령: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\validate.ps1
          - 실행한 빌드 명령: powershell -NoProfile -ExecutionPolicy Bypass -File .\build_windows_gui_exe.ps1

          ## 첨부파일
          - 산출물 파일명: $assetName
          - SHA256 파일명: $assetName.sha256
          - SHA256 체크섬: $checksum
          - 사용 방법: ZIP 파일과 .sha256 파일을 함께 다운로드해서 무결성을 확인한 뒤, Windows PC에서 ZIP 압축을 풀고 GUI 실행 파일을 실행하세요.

          <details>
          <summary>세부 커밋 및 변경 파일</summary>

          ### 원본 커밋 목록
          $commitText

          ### 변경 파일
          $changedFileText

          </details>
          "@
          $notes = $notes -replace "(?m)^          ", ""
          $notes | Set-Content -LiteralPath $notesPath -Encoding UTF8
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Create Git tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.metadata.outputs.tag }}" "${{ github.sha }}"
          git push origin "refs/tags/${{ steps.metadata.outputs.tag }}"

      - name: Create draft GitHub Release
        id: create_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.metadata.outputs.tag }}" `
            "${{ steps.assets.outputs.asset_path }}#${{ steps.metadata.outputs.asset_name }}" `
            "${{ steps.assets.outputs.checksum_path }}#${{ steps.assets.outputs.checksum_name }}" `
            --repo "${{ github.repository }}" `
            --target "${{ github.sha }}" `
            --title "${{ steps.metadata.outputs.project_name }} ${{ steps.metadata.outputs.tag }}" `
            --notes-file "${{ steps.notes.outputs.notes_path }}" `
            --verify-tag `
            --draft

      - name: Publish GitHub Release
        id: publish_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.metadata.outputs.tag }}" --repo "${{ github.repository }}" --json tagName,isDraft,assets
          gh release edit "${{ steps.metadata.outputs.tag }}" `
            --repo "${{ github.repository }}" `
            --draft=false `
            --latest

      - name: Remove incomplete draft release
        if: failure() && steps.metadata.outputs.tag != '' && steps.publish_release.outcome != 'success'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.metadata.outputs.tag }}"

          gh release delete "$tag" --repo "${{ github.repository }}" --yes --cleanup-tag
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "No draft release was deleted for $tag."
            $global:LASTEXITCODE = 0
          }

          git push origin ":refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "No remote tag was deleted for $tag."
            $global:LASTEXITCODE = 0
          }
