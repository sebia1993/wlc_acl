name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-and-build:
    name: Validate and build Windows package
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run validation
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\validate.ps1

      - name: Build Windows release package
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\build_windows_gui_exe.ps1

      - name: Verify package artifact
        shell: pwsh
        run: python .\tools\verify_release_package.py --dist .\dist --smoke-cli

      - name: Build Streamlit portable package
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\build_windows_streamlit_portable.ps1

      - name: Verify Streamlit portable package
        shell: pwsh
        run: python .\tools\verify_streamlit_portable_package.py --dist .\dist --smoke
